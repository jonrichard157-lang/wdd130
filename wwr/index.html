<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rafting home page">
    <meta name="author" content="João Ricardo Ribeiro da Silva">
    <title>Home - Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body class="home">

    <header>
        <img src="images/logo.jpg" alt="Rafting Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <!-- HERO -->
        <div class="hero">
            <img src="images/hero.jpg" alt="Rafting Adventure">
            <h1>Have An Adventure</h1>
        </div>

        <!-- GRID -->
        <section class="grid">
            <div>
                <img src="images/rafting1.png" alt="Rivers">
                <h2>Rivers</h3>
            </div>

            <div>
                <img src="images/rafting2.png" alt="Camping">
                <h2>Camping</h3>
            </div>

            <div>
                <img src="images/rafting3.png" alt="Rapids">
                <h2>Rapids</h3>
            </div>
        </section>

        <!-- NEWSLETTER -->
        <section class="newsletter">
            <h2>Join Our Newsletter</h2>
            <form>
                <label for="name">Name:</label>
                <input id="name" type="text" placeholder="Your Name" required>

                <label for="email">Email:</label>
                <input id="email" type="email" placeholder="Your Email" required>

                <button type="submit">Subscribe</button>
            </form>
        </section>

        <!-- CTA -->
        <section class="cta">
            <div class="cta-content">
                <h2>More Than Just The Thrill</h2>
                <p>
                    Enjoy breathtaking scenery and unforgettable adventures.
                    Discover why rafting is more than just excitement.
                </p>
                <a href="trips.html">View Trips</a>
            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 Adventure Rapids | João Ricardo</p>
        <nav class="socialmedia">
            <ul>
                <li><a href="https://facebook.com"><img src="images/facebook.png" width="40" alt="Facebook logo"></a>
                </li>
                <li><a href="https://linkedin.com"><img src="images/linkedin.png" width="40" alt="LinkedIn logo"></a>
                </li>
                <li><a href="https://instagram.com"><img src="images/instagram.jpg" width="40" alt="Instagram logo"></a>
                </li>
            </ul>
        </nav>
    </footer>

</body>

</html>
