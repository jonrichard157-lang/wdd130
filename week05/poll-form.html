<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Form</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>
<body>

<header>
    <h1>User Poll Form</h1>
</header>

<main>
    <form>

        <!-- Full Name -->
        <div class="form-item column2">
            <label for="fullname">Full Name:</label><br>
            <input type="text" id="fullname" name="fullname" required><br><br>
        </div>

        <!-- Email -->
        <div class="form-item column2">
            <label for="useremail">Email:</label><br>
            <input type="email" id="useremail" name="useremail" required><br><br>
        </div>

        <!-- Favorite Browser -->
        <div class="form-item column1">
            <label for="browser">What is your favorite browser?</label><br>
            <select id="browser" name="browser">
                <option value="">Choose one...</option>
                <option value="chrome">Chrome</option>
                <option value="safari">Safari</option>
                <option value="edge">Edge</option>
                <option value="brave">Brave</option>
            </select>
        </div>

        <!-- Pet Question -->
        <label for="pet">Do you have a household pet?</label>
        <input type="checkbox" id="pet" name="pet">
        <!-- Places Lived -->
        <label for="feedback">List the places you have lived:</label><br>
        <textarea id="feedback" name="feedback" rows="4" placeholder="São Paulo, Mairinque"></textarea><br><br>

        <!-- Submit -->
        <button type="submit">Submit Poll</button>

    </form>
</main>

<footer>
    <p>&copy; 2026 João Silva</p>
</footer>

</body>
</html>
